name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    name: Build and test
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]' || github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Build and generate coverage
        run: ./gradlew clean build jacocoTestReport

      - name: Run SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        run: ./gradlew sonar --info