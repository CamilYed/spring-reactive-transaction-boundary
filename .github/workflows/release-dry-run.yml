name: Release Dry Run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-dry-run:
    name: Build signed artifacts
    runs-on: ubuntu-latest

    env:
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Verify project
        run: ./gradlew spotlessCheck clean build jacocoTestReport --stacktrace

      - name: Publish signed artifacts to local staging repository
        run: ./gradlew publishAllPublicationsToLocalBuildRepository --stacktrace

      - name: Verify generated Maven artifacts and signatures
        run: |
          echo "Generated artifacts:"
          find build/staging-deploy -type f | sort

          echo "Generated signatures:"
          find build/staging-deploy -name "*.asc" -type f | sort

          ASC_COUNT="$(find build/staging-deploy -name "*.asc" -type f | wc -l | tr -d ' ')"

          if [ "$ASC_COUNT" -eq 0 ]; then
            echo "No .asc signature files were generated."
            exit 1
          fi

          echo "Signature files generated: $ASC_COUNT"
